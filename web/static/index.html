<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MijnThuisData - Bridge</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f9fb;
    --card: #ffffff;
    --card-border: #d8e1e8;
    --fg: #0f1720;
    --muted: #5b6778;
    --primary: #2d7fea;   /* Data Blue */
    --teal: #16b6a5;      /* Insight Teal */
    --success: #6cc53a;   /* Growth Green */
    --warning: #b4790c;
    --danger: #d92d38;
    --danger-bg: rgba(217,45,56,0.07);
    --danger-border: rgba(217,45,56,0.3);
    --danger-fg: #a3202b;
    --radius-card: 16px;
    --radius-control: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0e14;
      --card: #12161f;
      --card-border: rgba(255,255,255,0.07);
      --fg: #eef1f5;
      --muted: #8b93a3;
      --warning: #e6a23c;
      --danger: #ef4a55;
      --danger-bg: rgba(239,74,85,0.1);
      --danger-border: rgba(239,74,85,0.35);
      --danger-fg: #ff9298;
    }
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Manrope", "Inter", system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 2rem 1.25rem;
  }
  .wrap { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
  h1 {
    font-size: 1.05rem;
    font-weight: 700;
    margin: 0 0 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.65rem;
  }
  /* De wordmark-SVG gebruikt vaste merkkleuren (incl. donkere tekst) en is dus
     niet zelf theme-aware — een lichte achtergrondplaat houdt 'm leesbaar,
     ongeacht of de pagina in light of dark staat. */
  .logo-badge {
    background: #ffffff;
    border-radius: 8px;
    padding: 0.3rem 0.5rem;
    display: inline-flex;
    align-items: center;
    line-height: 0;
  }
  .logo-badge svg { height: 20px; width: auto; display: block; }
  h1 .agent-label { color: var(--muted); font-weight: 600; }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-card);
    padding: 1.1rem 1.25rem;
  }
  .card-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 0.6rem;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--card-border);
    font-size: 0.9rem;
  }
  .row:last-child { border-bottom: none; }
  .row > span:first-child { display: flex; align-items: center; min-width: 0; }
  .row > span:last-child { color: var(--fg); font-variant-numeric: tabular-nums; text-align: right; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 0.55rem; flex-shrink: 0; background: var(--muted); }
  .dot.ok { background: var(--success); }
  .dot.degraded, .dot.paused { background: var(--warning); }
  .dot.error, .dot.timeout { background: var(--danger); }
  .meta { color: var(--muted); font-size: 0.8rem; }
  .plugin-name { font-weight: 600; }
  .plugin-slug { color: var(--muted); font-size: 0.78rem; margin-left: 0.35rem; font-weight: 400; }
  .field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.75rem; }
  .field label { font-size: 0.78rem; color: var(--muted); }
  .field input {
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-control);
    color: var(--fg);
    padding: 0.55rem 0.7rem;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 0.82rem;
  }
  .field input:focus { outline: none; border-color: var(--primary); }
  .btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-control);
    padding: 0.55rem 1.1rem;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .btn:hover:not(:disabled) { filter: brightness(1.08); }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .status-msg { font-size: 0.8rem; margin-top: 0.6rem; }
  .status-msg.ok { color: var(--success); }
  .status-msg.error { color: var(--danger); }
  .banner {
    background: var(--danger-bg);
    border: 1px solid var(--danger-border);
    color: var(--danger-fg);
    border-radius: var(--radius-control);
    padding: 0.75rem 1rem;
    font-size: 0.85rem;
    display: none;
  }
  .empty { color: var(--muted); font-size: 0.85rem; }
</style>
</head>

      </span>
      <span class="agent-label">Bridge</span>
    </h1>
    <div class="banner" id="auth-banner"></div>

    <div class="card">
      <p class="card-title">Apparaat</p>
      <div id="device"></div>
    </div>

    <div class="card">
      <p class="card-title">Actieve koppelingen</p>
      <div id="plugins"></div>
    </div>

    <div class="card">
      <p class="card-title">Agent-token</p>
      <div class="field">
        <label for="token-input">mtd_agent_...</label>
        <input id="token-input" type="text" placeholder="mtd_agent_..." autocomplete="off">
      </div>
      <button class="btn" id="token-submit" onclick="submitToken()">Token opslaan</button>
      <div class="status-msg" id="token-status"></div>
    </div>
  </div>

  <script>
    let tokenPrefilled = false;

    function formatTimestamp(iso) {
      if (!iso) return null;
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleString('nl-NL', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
      });
    }

    async function refresh() {
      try {
        const [health, device] = await Promise.all([
          fetch('/api/health').then(r => r.json()),
          fetch('/api/device').then(r => r.json()),
        ]);

        const banner = document.getElementById('auth-banner');
        if (health.agent_status === 'auth_error') {
          banner.style.display = 'block';
          banner.textContent = '⚠ Agent-token klopt niet: ' + (health.auth_error || 'authenticatie mislukt') +
            ' — werk het token hieronder bij.';
        } else {
          banner.style.display = 'none';
        }

        // Vult het tokenveld één keer met de huidige waarde (niet bij elke
        // refresh, anders overschrijft dat wat de gebruiker aan het typen is).
        if (!tokenPrefilled && device.agent_key) {
          document.getElementById('token-input').value = device.agent_key;
          tokenPrefilled = true;
        }

        document.getElementById('device').innerHTML = `
          <div class="row"><span>Device</span><span>${device.device_id ?? '-'}</span></div>
          <div class="row"><span>Versie</span><span>${device.agent_version}</span></div>
          <div class="row"><span>Uptime</span><span>${Math.floor(device.uptime_s / 3600)}u ${Math.floor((device.uptime_s % 3600) / 60)}m</span></div>
          <div class="row"><span>Netwerk</span><span>${device.network_mode}</span></div>
          <div class="row"><span>Lokaal IP-adres</span><span>${device.local_ip ?? '-'}</span></div>
          <div class="row"><span>Subnetmasker</span><span>${device.subnet_mask ?? '-'}</span></div>
        `;

        const plugins = health.plugins || [];
        document.getElementById('plugins').innerHTML = plugins.length
          ? plugins.map(p => {
              // Primair: gebruiksvriendelijke integratienaam ("HomeWizard Watermeter"),
              // met de instantienaam/-ID erachter (bv. "— water-edge2"), zodat je bij
              // meerdere instanties van dezelfde integratie ze uit elkaar houdt.
              const primary = p.integration_name || p.id;
              const instanceLabel = p.label || p.slug || '';
              const slugSuffix = (p.slug && p.slug !== instanceLabel) ? ` (${p.slug})` : '';
              const instancePart = instanceLabel ? `<span class="plugin-slug">— ${instanceLabel}${slugSuffix}</span>` : '';
              const versionPart = p.installed_version ? `<span class="plugin-slug">v${p.installed_version}</span>` : '';
              const statusNote = p.status === 'paused' ? ' <span class="meta">(gepauzeerd)</span>'
                : p.status === 'degraded' ? ' <span class="meta">(storing)</span>' : '';
              return `
                <div class="row">
                  <span><span class="dot ${p.status}"></span><span class="plugin-name">${primary}</span> ${instancePart} ${versionPart}${statusNote}</span>
                  <span class="meta">${p.status === 'paused' ? '' : (formatTimestamp(p.last_reading_at) ?? 'geen data')}</span>
                </div>
              `;
            }).join('')
          : '<div class="empty">Geen plugins actief</div>';
      } catch (e) {
        console.error(e);
      }
    }
    refresh();
    setInterval(refresh, 10000);

    async function submitToken() {
      const token = document.getElementById('token-input').value.trim();
      const statusEl = document.getElementById('token-status');
      const btn = document.getElementById('token-submit');
      statusEl.textContent = '';
      statusEl.className = 'status-msg';

      if (!token) {
        statusEl.textContent = 'Vul een token in.';
        statusEl.classList.add('error');
        return;
      }

      btn.disabled = true;
      try {
        const resp = await fetch('/api/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        const data = await resp.json();
        if (resp.ok) {
          statusEl.textContent = data.message || 'Token opgeslagen, agent herstart...';
          statusEl.classList.add('ok');
        } else {
          statusEl.textContent = data.detail || 'Opslaan mislukt';
          statusEl.classList.add('error');
        }
      } catch (e) {
        statusEl.textContent = 'Verbindingsfout';
        statusEl.classList.add('error');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
