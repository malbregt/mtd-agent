<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MTD Agent</title>
<style>
  :root { color-scheme: dark; }
  body { background: #0f1115; color: #e6e8eb; font-family: system-ui, sans-serif; margin: 0; padding: 1.5rem; }
  h1 { font-size: 1.2rem; margin: 0 0 1rem; }
  .card { background: #1a1d24; border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid #2a2e37; }
  .row:last-child { border-bottom: none; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 0.5rem; background: #5a606e; }
  .ok { background: #3ecf6e; } .degraded, .paused { background: #e6a23c; } .error, .timeout { background: #e5484d; }
  .meta { color: #9aa0aa; font-size: 0.85rem; }
  .plugin-name { font-weight: 500; }
  .plugin-slug { color: #9aa0aa; font-size: 0.8rem; margin-left: 0.4rem; }
  .field { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.6rem; }
  .field label { font-size: 0.8rem; color: #9aa0aa; }
  .field input { background: #0f1115; border: 1px solid #2a2e37; border-radius: 6px; color: #e6e8eb;
                 padding: 0.45rem 0.6rem; font-family: monospace; font-size: 0.85rem; }
  .btn { background: #3ecf6e; color: #0f1115; border: none; border-radius: 6px; padding: 0.5rem 1rem;
         font-weight: 600; cursor: pointer; font-size: 0.85rem; }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .status-msg { font-size: 0.8rem; margin-top: 0.5rem; }
  .status-msg.ok { color: #3ecf6e; } .status-msg.error { color: #e5484d; }
  .banner { background: #3a1518; border: 1px solid #e5484d; color: #ff8a8a; border-radius: 8px;
            padding: 0.7rem 0.9rem; margin-bottom: 0.75rem; font-size: 0.85rem; display: none; }
</style>
</head>
<body>
  <h1>⚡ MTD Agent</h1>
  <div class="banner" id="auth-banner"></div>
  <div class="card" id="device"></div>
  <div class="card" id="plugins"></div>

  <div class="card">
    <div class="field">
      <label for="token-input">Agent-token (mtd_agent_...)</label>
      <input id="token-input" type="text" placeholder="mtd_agent_..." autocomplete="off">
    </div>
    <button class="btn" id="token-submit" onclick="submitToken()">Token opslaan</button>
    <div class="status-msg" id="token-status"></div>
  </div>

  <script>
    let tokenPrefilled = false;

    async function refresh() {
      try {
        const [health, device] = await Promise.all([
          fetch('/api/health').then(r => r.json()),
          fetch('/api/device').then(r => r.json()),
        ]);

        const banner = document.getElementById('auth-banner');
        if (health.agent_status === 'auth_error') {
          banner.style.display = 'block';
          banner.textContent = '⚠ Agent-token klopt niet: ' + (health.auth_error || 'authenticatie mislukt') +
            ' — werk het token hieronder bij.';
        } else {
          banner.style.display = 'none';
        }

        // Vult het tokenveld één keer met de huidige waarde (niet bij elke
        // refresh, anders overschrijft dat wat de gebruiker aan het typen is).
        if (!tokenPrefilled && device.agent_key) {
          document.getElementById('token-input').value = device.agent_key;
          tokenPrefilled = true;
        }

        document.getElementById('device').innerHTML = `
          <div class="row"><span>Device</span><span>${device.device_id ?? '-'}</span></div>
          <div class="row"><span>Versie</span><span>${device.agent_version}</span></div>
          <div class="row"><span>Uptime</span><span>${Math.floor(device.uptime_s / 3600)}u ${Math.floor((device.uptime_s % 3600) / 60)}m</span></div>
          <div class="row"><span>Netwerk</span><span>${device.network_mode}</span></div>
        `;

        const plugins = health.plugins || [];
        document.getElementById('plugins').innerHTML = plugins.length
          ? plugins.map(p => {
              // Primair: gebruiksvriendelijke integratienaam ("HomeWizard Watermeter"),
              // met de instantienaam/-ID erachter (bv. "— water-edge2"), zodat je bij
              // meerdere instanties van dezelfde integratie ze uit elkaar houdt.
              const primary = p.integration_name || p.id;
              const instanceLabel = p.label || p.slug || '';
              const slugSuffix = (p.slug && p.slug !== instanceLabel) ? ` (${p.slug})` : '';
              const instancePart = instanceLabel ? `<span class="plugin-slug">— ${instanceLabel}${slugSuffix}</span>` : '';
              const statusNote = p.status === 'paused' ? ' <span class="meta">(gepauzeerd)</span>'
                : p.status === 'degraded' ? ' <span class="meta">(storing)</span>' : '';
              return `
                <div class="row">
                  <span><span class="dot ${p.status}"></span><span class="plugin-name">${primary}</span> ${instancePart}${statusNote}</span>
                  <span class="meta">${p.status === 'paused' ? '' : (p.last_reading_at ?? 'geen data')}</span>
                </div>
              `;
            }).join('')
          : '<div class="meta">Geen plugins actief</div>';
      } catch (e) {
        console.error(e);
      }
    }
    refresh();
    setInterval(refresh, 10000);

    async function submitToken() {
      const token = document.getElementById('token-input').value.trim();
      const statusEl = document.getElementById('token-status');
      const btn = document.getElementById('token-submit');
      statusEl.textContent = '';
      statusEl.className = 'status-msg';

      if (!token) {
        statusEl.textContent = 'Vul een token in.';
        statusEl.classList.add('error');
        return;
      }

      btn.disabled = true;
      try {
        const resp = await fetch('/api/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        const data = await resp.json();
        if (resp.ok) {
          statusEl.textContent = data.message || 'Token opgeslagen, agent herstart...';
          statusEl.classList.add('ok');
        } else {
          statusEl.textContent = data.detail || 'Opslaan mislukt';
          statusEl.classList.add('error');
        }
      } catch (e) {
        statusEl.textContent = 'Verbindingsfout';
        statusEl.classList.add('error');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
