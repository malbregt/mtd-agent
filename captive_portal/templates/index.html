<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTD Agent Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #082B56; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; color: #1a1a1a; border-radius: 12px; padding: 32px; max-width: 420px; width: 100%; }
    h1 { font-size: 1.4rem; color: #082B56; margin-bottom: 6px; }
    p.sub { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: #444; margin-top: 14px; }
    input, select { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; }
    input:focus, select:focus { outline: none; border-color: #082B56; }
    .hint { font-size: 0.78rem; color: #888; margin-top: 4px; }
    .wifi-section { border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; }
    .wifi-section h3 { font-size: 0.9rem; color: #444; margin-bottom: 4px; }
    button.primary { margin-top: 24px; width: 100%; padding: 12px; background: linear-gradient(135deg, #082B56, #0a9b6e); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
    .status.success { background: #d4edda; color: #155724; display: block; }
    .status.error { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>
<div class="card">
  <h1>MTD Agent Setup</h1>
  <p class="sub">Voer de sleutel in die je via het mijnthuisdata portaal hebt aangemaakt.</p>

  <label>Instance key</label>
  <input type="text" id="instance-key" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" autocorrect="off" spellcheck="false">
  <p class="hint">Unieke sleutel van dit apparaat — aangemaakt in het portaal onder Apparaten.</p>

  <div class="wifi-section">
    <h3>WiFi (optioneel bij kabelverbinding)</h3>
    <label>Netwerk</label>
    <select id="wifi-ssid">
      <option value="">-- Geen WiFi (kabel) --</option>
    </select>
    <label>Wachtwoord</label>
    <input type="password" id="wifi-password" placeholder="Laat leeg voor open netwerk">
  </div>

  <button class="primary" onclick="submit()">Apparaat koppelen</button>
  <div class="status" id="status"></div>
</div>

<script>
  async function loadNetworks() {
    try {
      const resp = await fetch('/api/networks');
      const data = await resp.json();
      const sel = document.getElementById('wifi-ssid');
      data.networks.forEach(n => {
        sel.innerHTML += `<option value="${n}">${n}</option>`;
      });
    } catch(e) {}
  }

  async function submit() {
    const status = document.getElementById('status');
    status.className = 'status';

    const instanceKey = document.getElementById('instance-key').value.trim();

    if (!instanceKey) {
      status.className = 'status error';
      status.textContent = '✗ Instance key is verplicht';
      return;
    }

    try {
      const resp = await fetch('/api/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          instance_key: instanceKey,
          ssid: document.getElementById('wifi-ssid').value,
          wifi_password: document.getElementById('wifi-password').value
        })
      });
      const data = await resp.json();
      if (resp.ok) {
        status.className = 'status success';
        status.textContent = '✓ ' + data.message;
      } else {
        status.className = 'status error';
        status.textContent = '✗ ' + (data.error || 'Onbekende fout');
      }
    } catch(e) {
      status.className = 'status error';
      status.textContent = '✗ Verbindingsfout';
    }
  }

  loadNetworks();
</script>
</body>
</html>
